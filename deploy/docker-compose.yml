version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hubbax
      POSTGRES_PASSWORD: hubbax
      POSTGRES_DB: hubbax
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    image: node:18
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: postgres://hubbax:hubbax@db:5432/hubbax
      AI_URL: http://ai:8000/generate
    depends_on:
      - db
    command: ["node", "index.js"]
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: ["npm", "start"]
  ai:
    image: python:3.10
    working_dir: /app
    volumes:
      - ../ai:/app
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN}
    command: ["python", "main.py"]
volumes:
  db_data:
