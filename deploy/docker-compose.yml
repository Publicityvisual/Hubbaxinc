version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hubbax
      POSTGRES_PASSWORD: hubbax
      POSTGRES_DB: hubbax
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    image: node:18
    working_dir: /app
    volumes:
      - ../backend:/app
      - ../frontend:/frontend
    environment:
      DATABASE_URL: postgres://hubbax:hubbax@db:5432/hubbax
      AI_URL: http://ai:8000/generate
    depends_on:
      - db
    command: ["sh", "-c", "npm install && node index.js"]
    ports:
      - "3000:3000"
  ai:
    image: python:3.10
    working_dir: /app
    volumes:
      - ../ai:/app
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN}
      HF_MODEL_URL: ${HF_MODEL_URL}
    command: ["sh", "-c", "pip install -r requirements.txt && python main.py"]
    ports:
      - "8000:8000"
volumes:
  db_data:
